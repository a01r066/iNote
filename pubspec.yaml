name: inote_app
description: "Smart & user-friendly sales management application."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_hooks: ^0.21.2

  # --- Data & Serialization ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1

  # --- Networking ---
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # --- Firebase ---
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.4
  firebase_storage: ^12.3.7

  # --- Local Storage & Security ---
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # --- Navigation ---
  go_router: ^14.6.2

  # --- Connectivity ---
  connectivity_plus: ^6.1.1

  # --- UI ---
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  riverpod_generator: ^2.6.4
  json_serializable: ^6.8.0

  # --- Linting ---
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # --- Flavors ---
  flutter_flavorizr: ^2.2.2

# The following section is specific to Flutter packages.
# Force drift_flutter to NOT include sqlite3 for web builds
dependency_overrides:
  analyzer_plugin: ^0.13.1  # Force fixed version with publiclyExporting typo fix

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
